[railway]
  pluginVersion = "2"

[build]
  dockerfilePath = "Dockerfile"

[deploy]
  numReplicas = 1
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10
  startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[runtime]
  dialect = "python"

[variable]
  PYTHONUNBUFFERED = "1"
